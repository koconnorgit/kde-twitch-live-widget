<svg xmlns="http://www.w3.org/2000/svg" width="640" height="520" viewBox="0 0 640 520">
  <!-- Promotional preview of the Twitch Live widget (vertical layout). -->
  <defs>
    <style>
      .name { font-family: "Noto Sans","DejaVu Sans",sans-serif; font-weight: 700; fill: #ffffff; }
      .sub  { font-family: "Noto Sans","DejaVu Sans",sans-serif; font-weight: 400; fill: #c8c8d0; }
      .title{ font-family: "Noto Sans","DejaVu Sans",sans-serif; font-weight: 800; fill: #bf94ff; }
    </style>
  </defs>

  <!-- card -->
  <rect x="28" y="28" width="584" height="464" rx="28" fill="#17171b" fill-opacity="0.96"/>
  <rect x="28" y="28" width="584" height="464" rx="28" fill="none" stroke="#9146ff" stroke-opacity="0.55" stroke-width="2"/>

  <!-- header -->
  <circle cx="72" cy="92" r="9" fill="#e62117"/>
  <text class="title" x="92" y="102" font-size="30">Twitch&#160;Live</text>
  <line x1="60" y1="128" x2="580" y2="128" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

  <!-- entries: red live dot + channel name + game/viewers -->
  <g>
    <circle cx="74" cy="188" r="10" fill="#e62117"/>
    <text class="name" x="98" y="190" font-size="34">esfandtv</text>
    <text class="sub"  x="98" y="222" font-size="20">Just Chatting &#183; 21.4K viewers</text>
  </g>
  <g>
    <circle cx="74" cy="288" r="10" fill="#e62117"/>
    <text class="name" x="98" y="290" font-size="34">jinnytty</text>
    <text class="sub"  x="98" y="322" font-size="20">IRL &#183; 9.7K viewers</text>
  </g>
  <g>
    <circle cx="74" cy="388" r="10" fill="#e62117"/>
    <text class="name" x="98" y="390" font-size="34">cohhcarnage</text>
    <text class="sub"  x="98" y="422" font-size="20">Elden Ring &#183; 6.1K viewers</text>
  </g>
</svg>
